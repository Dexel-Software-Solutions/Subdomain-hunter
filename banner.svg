<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f1a;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter for text -->
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="1" fill="rgba(255,255,255,0.015)"/>
      <rect x="0" y="1" width="1" height="2" fill="transparent"/>
    </pattern>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,30,30,0.06)" stroke-width="0.5"/>
    </pattern>

    <!-- Clip path for content -->
    <clipPath id="mainclip">
      <rect width="900" height="280" rx="12"/>
    </clipPath>

    <!-- Animated gradient for accent line -->
    <linearGradient id="line-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="20%" style="stop-color:#ff2233"/>
      <stop offset="50%" style="stop-color:#ff6644"/>
      <stop offset="80%" style="stop-color:#ff2233"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>

    <!-- Radial glow behind logo -->
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,34,51,0.12);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(255,34,51,0);stop-opacity:1"/>
    </radialGradient>
  </defs>

  <!-- Main background -->
  <g clip-path="url(#mainclip)">
    <rect width="900" height="280" fill="url(#bg)"/>
    <rect width="900" height="280" fill="url(#grid)"/>
    <rect width="900" height="280" fill="url(#scanlines)"/>

    <!-- Center radial glow -->
    <ellipse cx="450" cy="140" rx="350" ry="180" fill="url(#center-glow)">
      <animate attributeName="rx" values="350;380;350" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="180;200;180" dur="4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Corner accent dots -->
    <circle cx="20" cy="20" r="2" fill="#ff2233" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="20" r="2" fill="#ff2233" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="260" r="2" fill="#ff2233" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="260" r="2" fill="#ff2233" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Top border line, animated sweep -->
    <rect x="0" y="0" width="900" height="1.5" fill="url(#line-gradient)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- Bottom border line -->
    <rect x="0" y="278.5" width="900" height="1.5" fill="url(#line-gradient)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Left vertical line -->
    <rect x="0" y="0" width="1.5" height="280" fill="rgba(255,34,51,0.4)"/>
    <!-- Right vertical line -->
    <rect x="898.5" y="0" width="1.5" height="280" fill="rgba(255,34,51,0.4)"/>

    <!-- Decorative horizontal rule left -->
    <line x1="30" y1="140" x2="180" y2="140" stroke="rgba(255,34,51,0.2)" stroke-width="0.5"/>
    <!-- Decorative horizontal rule right -->
    <line x1="720" y1="140" x2="870" y2="140" stroke="rgba(255,34,51,0.2)" stroke-width="0.5"/>

    <!-- ─── ASCII ART LOGO ─────────────────────────────── -->
    <!-- Using monospace text to render the logo -->
    <g filter="url(#glow-red)">
      <text font-family="'Courier New', Courier, monospace" font-size="13.5" fill="#ff2233" text-anchor="middle" x="450" letter-spacing="1">
        <!-- Each row of the ASCII art, staggered animation -->
        <tspan x="450" dy="0">
          <animate attributeName="opacity" values="0;0;1" dur="0.8s" fill="freeze"/>
          ███████╗██╗   ██╗██████╗ ███████╗
        </tspan>
        <tspan x="450" dy="16">
          <animate attributeName="opacity" values="0;0;1" dur="0.8s" begin="0.1s" fill="freeze"/>
          ██╔════╝██║   ██║██╔══██╗██╔════╝
        </tspan>
        <tspan x="450" dy="16">
          <animate attributeName="opacity" values="0;0;1" dur="0.8s" begin="0.2s" fill="freeze"/>
          ███████╗██║   ██║██████╔╝█████╗
        </tspan>
        <tspan x="450" dy="16">
          <animate attributeName="opacity" values="0;0;1" dur="0.8s" begin="0.3s" fill="freeze"/>
          ╚════██║██║   ██║██╔══██╗██╔══╝
        </tspan>
        <tspan x="450" dy="16">
          <animate attributeName="opacity" values="0;0;1" dur="0.8s" begin="0.4s" fill="freeze"/>
          ███████║╚██████╔╝██████╔╝███████╗
        </tspan>
        <tspan x="450" dy="16">
          <animate attributeName="opacity" values="0;0;1" dur="0.8s" begin="0.5s" fill="freeze"/>
          ╚══════╝ ╚═════╝ ╚═════╝ ╚══════╝
        </tspan>
      </text>
    </g>

    <!-- ─── SUBTITLE ──────────────────────────────────── -->
    <text font-family="'Courier New', Courier, monospace" font-size="11" fill="#888" text-anchor="middle" x="450" y="152" letter-spacing="3">
      <animate attributeName="opacity" values="0;1" dur="1s" begin="0.7s" fill="freeze"/>
      S U B D O M A I N  E N U M E R A T O R
    </text>

    <!-- Version badge -->
    <g transform="translate(450,168)">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.9s" fill="freeze"/>
      <rect x="-32" y="-10" width="64" height="18" rx="3" fill="rgba(255,34,51,0.15)" stroke="rgba(255,34,51,0.4)" stroke-width="0.8"/>
      <text font-family="'Courier New', Courier, monospace" font-size="9" fill="#ff4455" text-anchor="middle" y="3" letter-spacing="1">v3.0.0</text>
    </g>

    <!-- ─── FEATURE PILLS ─────────────────────────────── -->
    <!-- Row 1 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.1s" fill="freeze"/>

      <!-- CT Logs -->
      <rect x="50" y="200" width="110" height="22" rx="11" fill="rgba(255,34,51,0.1)" stroke="rgba(255,34,51,0.35)" stroke-width="0.8"/>
      <text font-family="'Courier New', Courier, monospace" font-size="9" fill="#ff6677" x="105" y="215" text-anchor="middle">🔍 CT Logs</text>

      <!-- Passive Sources -->
      <rect x="175" y="200" width="130" height="22" rx="11" fill="rgba(255,34,51,0.1)" stroke="rgba(255,34,51,0.35)" stroke-width="0.8"/>
      <text font-family="'Courier New', Courier, monospace" font-size="9" fill="#ff6677" x="240" y="215" text-anchor="middle">🌐 3x Passive Sources</text>

      <!-- Bruteforce -->
      <rect x="320" y="200" width="120" height="22" rx="11" fill="rgba(255,34,51,0.1)" stroke="rgba(255,34,51,0.35)" stroke-width="0.8"/>
      <text font-family="'Courier New', Courier, monospace" font-size="9" fill="#ff6677" x="380" y="215" text-anchor="middle">⚡ Smart Brute-force</text>

      <!-- HTTP Detect -->
      <rect x="455" y="200" width="115" height="22" rx="11" fill="rgba(255,34,51,0.1)" stroke="rgba(255,34,51,0.35)" stroke-width="0.8"/>
      <text font-family="'Courier New', Courier, monospace" font-size="9" fill="#ff6677" x="512" y="215" text-anchor="middle">🔗 HTTP Detection</text>

      <!-- ASN -->
      <rect x="585" y="200" width="110" height="22" rx="11" fill="rgba(255,34,51,0.1)" stroke="rgba(255,34,51,0.35)" stroke-width="0.8"/>
      <text font-family="'Courier New', Courier, monospace" font-size="9" fill="#ff6677" x="640" y="215" text-anchor="middle">🏢 ASN / Geo</text>

      <!-- Risk Flags -->
      <rect x="710" y="200" width="110" height="22" rx="11" fill="rgba(255,34,51,0.1)" stroke="rgba(255,34,51,0.35)" stroke-width="0.8"/>
      <text font-family="'Courier New', Courier, monospace" font-size="9" fill="#ff6677" x="765" y="215" text-anchor="middle">🚩 Risk Flags</text>
    </g>

    <!-- Row 2 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.3s" fill="freeze"/>

      <!-- Wildcard -->
      <rect x="110" y="232" width="130" height="22" rx="11" fill="rgba(255,100,30,0.1)" stroke="rgba(255,100,30,0.35)" stroke-width="0.8"/>
      <text font-family="'Courier New', Courier, monospace" font-size="9" fill="#ff9966" x="175" y="247" text-anchor="middle">🌀 Wildcard Filter</text>

      <!-- Validation -->
      <rect x="258" y="232" width="120" height="22" rx="11" fill="rgba(255,100,30,0.1)" stroke="rgba(255,100,30,0.35)" stroke-width="0.8"/>
      <text font-family="'Courier New', Courier, monospace" font-size="9" fill="#ff9966" x="318" y="247" text-anchor="middle">✅ Dead Filter</text>

      <!-- Rich UI -->
      <rect x="393" y="232" width="115" height="22" rx="11" fill="rgba(255,100,30,0.1)" stroke="rgba(255,100,30,0.35)" stroke-width="0.8"/>
      <text font-family="'Courier New', Courier, monospace" font-size="9" fill="#ff9966" x="450" y="247" text-anchor="middle">🖥️ Rich Terminal UI</text>

      <!-- Export -->
      <rect x="523" y="232" width="115" height="22" rx="11" fill="rgba(255,100,30,0.1)" stroke="rgba(255,100,30,0.35)" stroke-width="0.8"/>
      <text font-family="'Courier New', Courier, monospace" font-size="9" fill="#ff9966" x="580" y="247" text-anchor="middle">📤 JSON + CSV</text>

      <!-- Author -->
      <rect x="653" y="232" width="138" height="22" rx="11" fill="rgba(255,100,30,0.1)" stroke="rgba(255,100,30,0.35)" stroke-width="0.8"/>
      <text font-family="'Courier New', Courier, monospace" font-size="9" fill="#ff9966" x="722" y="247" text-anchor="middle">👤 Demiyan Dissanayake</text>
    </g>

    <!-- ─── BLINKING CURSOR ─────────────────────────── -->
    <rect x="450" y="186" width="8" height="1.5" fill="#ff2233">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0;1" dur="1s" begin="1.5s" fill="freeze"/>
    </rect>

    <!-- Subtle particle dots -->
    <circle cx="100" cy="60" r="1" fill="#ff2233" opacity="0.3">
      <animate attributeName="cy" values="60;50;60" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="80" r="1" fill="#ff2233" opacity="0.3">
      <animate attributeName="cy" values="80;70;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="220" r="1" fill="#ff4433" opacity="0.25">
      <animate attributeName="cy" values="220;210;220" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="210" r="1" fill="#ff4433" opacity="0.25">
      <animate attributeName="cy" values="210;200;210" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
